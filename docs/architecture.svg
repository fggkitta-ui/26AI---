<svg width="680" height="832" viewBox="0 0 680 832" xmlns="http://www.w3.org/2000/svg" role="img">
<title>招投标信息智能聚合系统架构图</title>
<desc>从用户自然语言输入，经意图解析层、数据源适配层（含多个网站适配器）、清洗去重层、汇总生成层、调度增量推送层，最终输出Word报告的六层流水线架构</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect x="0" y="0" width="680" height="832" fill="#FFFFFF"/>

<!-- B1 input -->
<rect x="140" y="40" width="400" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="64" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">用户自然语言输入</text>
<text x="340" y="86" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">主题 / 区域 / 时间 / 频率</text>
<line x1="340" y1="104" x2="340" y2="140" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- B2 -->
<rect x="140" y="140" width="400" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="164" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">意图解析层</text>
<text x="340" y="186" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3C3489">LLM结构化抽取 + 规则兜底</text>
<line x1="340" y1="204" x2="340" y2="240" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- B3 -->
<rect x="140" y="240" width="400" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="264" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">数据源适配层</text>
<text x="340" y="286" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3C3489">插件化多站点抓取</text>
<line x1="340" y1="304" x2="340" y2="334" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Adapter tier -->
<rect x="100" y="334" width="150" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="175" y="358" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">政府公示平台</text>
<text x="175" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#085041">免费公开</text>

<rect x="265" y="334" width="150" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="358" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">需登录标讯网站</text>
<text x="340" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#085041">免费会员可见</text>

<rect x="430" y="334" width="150" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="505" y="358" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">行业/聚合站点</text>
<text x="505" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#085041">多站点聚合</text>

<line x1="340" y1="398" x2="340" y2="428" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- B4 -->
<rect x="140" y="428" width="400" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="452" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">清洗去重层</text>
<text x="340" y="474" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3C3489">去噪 + 指纹去重 + 条件筛选</text>
<line x1="340" y1="492" x2="340" y2="528" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- B5 -->
<rect x="140" y="528" width="400" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="552" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">汇总生成层</text>
<text x="340" y="574" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3C3489">五要素结构化摘要（可溯源）</text>
<line x1="340" y1="592" x2="340" y2="628" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- B6 -->
<rect x="140" y="628" width="400" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="652" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">调度增量推送层</text>
<text x="340" y="674" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3C3489">定时执行 + 增量推送</text>
<line x1="340" y1="692" x2="340" y2="728" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- B7 output -->
<rect x="140" y="728" width="400" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="752" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">输出 Word 报告</text>
<text x="340" y="774" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">按命名规则落盘</text>
</svg>
